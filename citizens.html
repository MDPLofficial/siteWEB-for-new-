<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizens</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body data-page="citizens">
    <header id="header"></header>

    <main>
        <div class="container">
            <section class="citizens-page">

                <div class="container">

                    <!-- Заголовок -->
                    <div class="hero-citizens">
                        <h1>Громадяни</h1>
                        <p>Спільнота активних учасників цифрової держави.</p>
                    </div>

                    <!-- Статистика -->
                    <div class="stats">
                        <div class="stat-card card">
                            <p>Всього громадян</p>
                            <span id="total-count">0</span>
                        </div>

                        <div class="stat-card card">
                            <p>🟢 Онлайн зараз</p>
                            <span id="online-count">0</span>
                        </div>

                        <div class="stat-card card">
                            <p>Нових за місяць</p>
                            <span id="new-count">0</span>
                        </div>

                        <input type="text" id="search" placeholder="Пошук громадянина...">
                    </div>

                    <!-- Фільтри -->
                    <div class="filters">
                        <button data-filter="all">Усі</button>
                        <button data-filter="government">Уряд</button>
                        <button data-filter="minister">Міністри</button>
                        <button data-filter="active">Активні</button>
                        <button data-filter="new">Нові</button>
                    </div>

                    <!-- СПИСОК -->
                    <div id="citizens-list" class="citizens-list">
                    <!-- Example -->

                    </div>

                    <div class="slogan">
                        <p>"Кожен громадянин - це частина цифрової держави"</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-right">
                <p><strong>МДПЛ</strong>-цифрова держава спільноти</p>
                <p>@ 2026 МДПЛ. Усі права захищено.</p>
            </div>
            <div class="footer-left">
                <nav>
                    <a href="https://discord.gg/MwVAkWAUa9'">Discord</a>
                    <a href="constitution.html">Конституція</a>
                    <a href="news.html">Новини</a>
                </nav>
            </div>
        </div>
    </footer>


    <div class="modal modal-citizen-card"></div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
